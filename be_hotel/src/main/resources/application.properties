# Import .env
spring.config.import=optional:file:.env[.properties]

# Server
server.port=8082

# Oracle DataSource
spring.datasource.driver-class-name=net.sf.log4jdbc.sql.jdbcapi.DriverSpy
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=10

# MyBatis
mybatis.mapper-locations=classpath:org/zerock/mapper/*.xml
mybatis.type-aliases-package=org.zerock.domain

# Mail (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# File Upload
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=40MB
spring.servlet.multipart.location=C:\\upload\\temp

# Mail From Address
app.mail.from-address=${MAIL_FROM_ADDRESS}

# Upload path
app.upload-path=C:\\upload

# CORS
app.cors.allowed-origins=http://localhost:8081

# Naver OAuth
naver.oauth.client-id=${NAVER_CLIENT_ID}
naver.oauth.client-secret=${NAVER_CLIENT_SECRET}
naver.oauth.redirect-uri=${NAVER_REDIRECT_URI}

# Log4jdbc
logging.level.org.zerock=DEBUG
logging.level.jdbc=OFF
logging.level.jdbc.sqlonly=OFF
logging.level.jdbc.sqltiming=DEBUG
logging.level.jdbc.audit=OFF
logging.level.jdbc.resultset=OFF
logging.level.jdbc.resultsettable=DEBUG
logging.level.jdbc.connection=OFF
